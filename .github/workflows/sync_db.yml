name: Sync Processed Repositories Database

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  sync:
    if: contains(github.event.issue.labels.*.name, 'db-update')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse and Update Database
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -c '
          import json
          import os
          import sys

          issue_body = os.environ.get("ISSUE_BODY", "")
          db_path = "db/processed_repos.json"

          try:
              # Locate JSON payload in issue description
              start = issue_body.find("{")
              end = issue_body.rfind("}") + 1
              if start == -1 or end == 0:
                  raise ValueError("No valid JSON payload found in issue body.")
              
              new_entry = json.loads(issue_body[start:end])
              
              # Load existing database
              if os.path.exists(db_path):
                  with open(db_path, "r", encoding="utf-8") as f:
                      db = json.load(f)
              else:
                  db = []
              
              # Ensure uniqueness
              for entry in db:
                  if entry.get("codeberg_url") == new_entry.get("codeberg_url"):
                      print("Duplicate Codeberg URL detected in database. Halting sync.")
                      sys.exit(0)
                      
              db.append(new_entry)
              
              # Write updated DB back to disk
              os.makedirs(os.path.dirname(db_path), exist_ok=True)
              with open(db_path, "w", encoding="utf-8") as f:
                  json.dump(db, f, indent=4)
              
              print("Database updated successfully.")
          except Exception as e:
              print(f"Error updating database: {e}")
              sys.exit(1)
          '

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add db/processed_repos.json
          git commit -m "db: auto-update processed repositories from issue #${{ github.event.issue.number }}"
          git push origin master || git push origin main

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "Automatically synced entry to database and closed issue."
